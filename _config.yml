locale: "en-US"
site_theme: "default"
title: "Mette Foged"
name: &name "Mette Foged"
description: &description "Research, working papers, and notes by Mette Foged."
url: "https://mettefoged.github.io"
baseurl: ""
repository: "mettefoged/mettefoged.github.io"

author:
  avatar: "profile.jpg"
  name: "Mette Foged"
  citation_name: "Foged, M."
  # TODO: replace with your own short bio
  bio: "Economist working on migration, labour markets, and applied microeconometrics."
  # TODO: update your affiliations
  employer:
    - "University of Copenhagen, Department of Economics"
    - "ROCKWOOL Foundation"
  location: "Copenhagen, Denmark"
  email: "TODO@example.com"        # TODO: your email
  googlescholar: ""                # TODO: your Google Scholar URL
  orcid: ""                        # TODO: your ORCID URL

teaser:
breadcrumbs: false
words_per_minute: 180
future: false
read_more: "disabled"
atom_feed:
  hide: true

twitter:
  username: &twitter
facebook:
  username:
  app_id:
  publisher:
og_image:
social:
  type: "Person"
  name: "Mette Foged"
  links:                           # TODO: add your Scholar / ORCID / profile URLs
    - ""

include:
  - .htaccess
  - _pages
  - files
exclude:
  - content-manager.html
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - tmp
  - vendor
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "<!--more-->"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  smart_quotes: lsquo,rsquo,ldquo,rdquo

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: false
      categories:
        - notes
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Europe/Copenhagen

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
