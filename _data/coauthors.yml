# Co-author / people library — define each person ONCE here, then reuse them by
# `key` in both _data/research.yml (paper bylines) and _data/people.yml (the
# People grid). No need to retype names or URLs.
#
# Each entry supports:
#   name        (required)  — display name (byline + People card name)
#   url         (optional)  — homepage; makes the name / People card a link
#   photo       (optional)  — path under /images/people/, used on the People grid
#   role        (optional)  — position / title, used on the People grid
#   affiliation (optional)  — institution, used on the People grid
#
# TODO (Mette): add url / photo / affiliation to each person below as desired —
# they show up automatically on the People page.

