# Research agendas, shown as a grid of clickable photo cards. Clicking a card
# expands it to reveal the description and the related papers.
#
# Each agenda supports:
#   title       (required)  — name of the research agenda
#   photo       (optional)  — path under /images/projects/, e.g. /images/projects/x.jpg
#   description (optional)  — 1-3 sentences on what this agenda is about
#   papers      (optional)  — list of 2-5 related papers, each with:
#                               title (required), year, venue (optional),
#                               and links: [ { label, url } ]
#
# Replace the example below with real agendas. Leave the file with no agendas
# and the Projects page shows a placeholder instead.

- title: "Refugee integration"
  photo: "/images/projects/refugee-integration.jpg"
  description: "How reception policy and initial conditions shape the long-run integration of refugees."
  papers:
    - title: "How Initial Accommodation Shapes Refugee Integration"
      year: 2026
      venue: "Working paper"
      links:
        - label: "Paper"
          url: "https://example.com"
    - title: "Who Opens Their Homes to Refugees?"
      year: 2026
      venue: "Working paper"
      links:
        - label: "Paper"
          url: "https://example.com"
