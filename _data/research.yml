# Research outputs, grouped into sections.
# Add entries under a section's `items:` (use content-manager.html, or copy the
# commented template at the bottom of this file). An entry WITH a `summary` gets
# the full layout (index number, Read-summary toggle, BibTeX); without a summary
# it renders as a compact entry. Empty sections show their `empty_message`.
sections:
  - title: "Journal articles"
    description: "Published and forthcoming peer-reviewed work."
    empty_message: "No journal articles added yet."
    items: []

  - title: "Working papers and projects"
    description: "Current papers, ongoing research, and major projects."
    empty_message: "No working papers added yet."
    items: []

  - title: "Non-academic work"
    description: "Policy notes, reports, and applied writing."
    empty_message: "No content added yet."
    items: []

  - title: "Older projects and research assistance contribution"
    description: "Earlier projects and analysis support."
    empty_message: "Nothing added yet."
    items: []

